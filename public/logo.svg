<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="ribbon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Left ribbon bow -->
  <g transform="translate(18, 38)">
    <!-- left loop -->
    <ellipse cx="-4" cy="2" rx="14" ry="9" fill="url(#ribbon1)" opacity="0.85" transform="rotate(-30)"/>
    <!-- right loop -->
    <ellipse cx="12" cy="-2" rx="14" ry="9" fill="url(#ribbon2)" opacity="0.85" transform="rotate(30)"/>
    <!-- center knot -->
    <circle cx="4" cy="2" r="5" fill="#db2777"/>
    <!-- tail left -->
    <path d="M0,6 Q-8,20 -14,28" stroke="#f9a8d4" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- tail right -->
    <path d="M8,6 Q16,20 22,28" stroke="#f9a8d4" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Main text: MNM AR -->
  <text x="52" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="800" fill="url(#textGrad)" letter-spacing="2">
    MNM AR
  </text>

  <!-- Subtext: Jonina -->
  <text x="52" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#db2777" font-style="italic" letter-spacing="1">
    Jonina
  </text>

  <!-- Small heart after Jonina -->
  <g transform="translate(175, 68)">
    <path d="M0,-4 C0,-6.5 -4,-8 -6,-5 C-8,-2 0,4 0,6 C0,4 8,-2 6,-5 C4,-8 0,-6.5 0,-4Z" fill="url(#heart)" opacity="0.7"/>
  </g>

  <!-- Right side ribbon decoration -->
  <g transform="translate(320, 32)">
    <ellipse cx="-2" cy="1" rx="12" ry="7.5" fill="url(#ribbon1)" opacity="0.6" transform="rotate(-25)"/>
    <ellipse cx="10" cy="-1" rx="12" ry="7.5" fill="url(#ribbon2)" opacity="0.6" transform="rotate(25)"/>
    <circle cx="4" cy="1" r="4" fill="#db2777" opacity="0.7"/>
    <path d="M0,5 Q-6,15 -10,22" stroke="#f9a8d4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M8,5 Q14,15 18,22" stroke="#f9a8d4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="245" cy="30" r="2" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="260" cy="22" r="1.5" fill="#f472b6" opacity="0.4"/>
  <circle cx="290" cy="75" r="2" fill="#fbcfe8" opacity="0.5"/>
  <circle cx="42" cy="18" r="1.5" fill="#f9a8d4" opacity="0.4"/>
</svg>
