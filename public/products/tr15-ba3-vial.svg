<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <!-- sparkles -->
  <circle cx="80" cy="80" r="4" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="320" cy="100" r="3" fill="#f472b6" opacity="0.5"/>
  <circle cx="100" cy="300" r="3.5" fill="#fbcfe8" opacity="0.7"/>
  <circle cx="310" cy="280" r="4" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="200" cy="60" r="2.5" fill="#ec4899" opacity="0.4"/>
  <!-- star sparkles -->
  <text x="70" y="130" font-size="18" opacity="0.4">&#x2728;</text>
  <text x="310" y="200" font-size="16" opacity="0.35">&#x2728;</text>
  <text x="90" y="250" font-size="14" opacity="0.3">&#x2728;</text>
  <!-- vial body -->
  <rect x="160" y="100" width="80" height="200" rx="12" fill="url(#vial)" opacity="0.15" stroke="#f472b6" stroke-width="2.5"/>
  <!-- liquid inside -->
  <rect x="166" y="170" width="68" height="124" rx="9" fill="url(#liquid)" opacity="0.5"/>
  <!-- bubbles in liquid -->
  <circle cx="185" cy="250" r="4" fill="white" opacity="0.5"/>
  <circle cx="210" cy="230" r="3" fill="white" opacity="0.4"/>
  <circle cx="195" cy="270" r="2.5" fill="white" opacity="0.35"/>
  <!-- vial cap -->
  <rect x="170" y="88" width="60" height="22" rx="6" fill="url(#cap)"/>
  <!-- cap top ring -->
  <rect x="175" y="82" width="50" height="10" rx="5" fill="#db2777"/>
  <!-- vial shine -->
  <rect x="170" y="120" width="8" height="60" rx="4" fill="white" opacity="0.3"/>
  <!-- label on vial -->
  <rect x="172" y="190" width="56" height="40" rx="6" fill="white" opacity="0.8"/>
  <text x="200" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#db2777">TR15</text>
  <text x="200" y="222" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9d7a9f">15mg</text>
  <!-- small water vial -->
  <rect x="260" y="200" width="40" height="100" rx="8" fill="#e0f2fe" opacity="0.6" stroke="#7dd3fc" stroke-width="1.5"/>
  <rect x="264" y="240" width="32" height="56" rx="6" fill="#bae6fd" opacity="0.5"/>
  <rect x="266" y="194" width="28" height="12" rx="4" fill="#38bdf8"/>
  <text x="280" y="275" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#0284c7">BA3</text>
  <!-- heart decoration -->
  <text x="200" y="350" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
