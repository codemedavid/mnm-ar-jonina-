<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="4" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="320" cy="100" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="100" cy="300" r="3.5" fill="#fbcfe8" opacity="0.7"/>
  <text x="70" y="130" font-size="18" opacity="0.4">&#x2728;</text>
  <text x="310" y="200" font-size="16" opacity="0.35">&#x1F4A7;</text>
  <!-- single vial -->
  <rect x="160" y="100" width="80" height="200" rx="12" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="2.5"/>
  <rect x="166" y="170" width="68" height="124" rx="9" fill="url(#liquid)" opacity="0.5"/>
  <circle cx="185" cy="250" r="4" fill="white" opacity="0.5"/>
  <circle cx="210" cy="230" r="3" fill="white" opacity="0.4"/>
  <circle cx="195" cy="270" r="2.5" fill="white" opacity="0.35"/>
  <rect x="170" y="88" width="60" height="22" rx="6" fill="url(#cap)"/>
  <rect x="175" y="82" width="50" height="10" rx="5" fill="#2563eb"/>
  <rect x="170" y="120" width="8" height="60" rx="4" fill="white" opacity="0.3"/>
  <rect x="172" y="195" width="56" height="35" rx="6" fill="white" opacity="0.85"/>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#1d4ed8">AQUALYX</text>
  <text x="200" y="222" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">1 vial</text>
  <text x="200" y="350" text-anchor="middle" font-size="22">&#x1F380;</text>
