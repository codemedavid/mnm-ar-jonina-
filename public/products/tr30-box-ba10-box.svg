<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="box1side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="box2side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="75" cy="70" r="4" fill="#fda4af" opacity="0.6"/>
  <circle cx="330" cy="90" r="3" fill="#fb7185" opacity="0.5"/>
  <text x="60" y="115" font-size="16" opacity="0.4">&#x2728;</text>
  <text x="320" y="185" font-size="14" opacity="0.35">&#x2728;</text>
  <rect x="145" y="42" width="110" height="26" rx="13" fill="#f43f5e" opacity="0.15"/>
  <text x="200" y="60" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#be123c">BOX SET</text>
  <!-- Rose box (TR30) - slightly larger -->
  <g transform="translate(60, 90)">
    <polygon points="85,18 180,0 255,35 160,53" fill="url(#box1)" stroke="#fb7185" stroke-width="1.5"/>
    <polygon points="85,18 85,128 160,158 160,53" fill="url(#box1side)" opacity="0.7" stroke="#f43f5e" stroke-width="1.5"/>
    <polygon points="160,53 160,158 255,140 255,35" fill="#fecdd3" opacity="0.5" stroke="#fb7185" stroke-width="1.5"/>
    <rect x="97" y="58" width="52" height="55" rx="5" fill="white" opacity="0.85"/>
    <text x="123" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="800" fill="#be123c">TR30</text>
    <text x="123" y="93" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9d7a9f">30mg</text>
    <text x="123" y="105" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#e11d48">x10 vials</text>
    <polygon points="95,20 140,12 150,16 105,24" fill="white" opacity="0.3"/>
  </g>
  <!-- Blue box (BA10) - larger -->
  <g transform="translate(185, 155)">
    <polygon points="50,14 125,0 180,25 105,39" fill="url(#box2)" stroke="#60a5fa" stroke-width="1.5"/>
    <polygon points="50,14 50,95 105,118 105,39" fill="url(#box2side)" opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="105,39 105,118 180,103 180,25" fill="#bfdbfe" opacity="0.5" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="58" y="44" width="40" height="38" rx="4" fill="white" opacity="0.85"/>
    <text x="78" y="61" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#1d4ed8">BA10</text>
    <text x="78" y="74" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#6b7280">x10 vials</text>
    <polygon points="58,16 88,10 96,13 66,19" fill="white" opacity="0.3"/>
  </g>
  <text x="200" y="370" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
