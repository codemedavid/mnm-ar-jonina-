<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="4" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="320" cy="100" r="3" fill="#fde68a" opacity="0.5"/>
  <circle cx="100" cy="300" r="3.5" fill="#fbcfe8" opacity="0.7"/>
  <circle cx="310" cy="280" r="4" fill="#fde68a" opacity="0.5"/>
  <text x="70" y="130" font-size="18" opacity="0.4">&#x2728;</text>
  <text x="310" y="200" font-size="16" opacity="0.35">&#x1F34B;</text>
  <text x="85" y="260" font-size="14" opacity="0.3">&#x2728;</text>
  <!-- lemon-shaped bottle -->
  <ellipse cx="200" cy="210" rx="55" ry="80" fill="url(#vial)" opacity="0.15" stroke="#fbbf24" stroke-width="2.5"/>
  <ellipse cx="200" cy="220" rx="45" ry="65" fill="url(#liquid)" opacity="0.5"/>
  <circle cx="185" cy="240" r="4" fill="white" opacity="0.5"/>
  <circle cx="215" cy="220" r="3" fill="white" opacity="0.4"/>
  <circle cx="195" cy="260" r="2.5" fill="white" opacity="0.35"/>
  <!-- bottle neck -->
  <rect x="185" y="120" width="30" height="30" rx="4" fill="#fef9c3" opacity="0.4" stroke="#fbbf24" stroke-width="2"/>
  <rect x="182" y="108" width="36" height="18" rx="6" fill="url(#cap)"/>
  <rect x="186" y="103" width="28" height="8" rx="4" fill="#f59e0b"/>
  <!-- shine -->
  <ellipse cx="178" cy="190" rx="5" ry="30" fill="white" opacity="0.3"/>
  <!-- label -->
  <rect x="172" y="200" width="56" height="35" rx="6" fill="white" opacity="0.85"/>
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#d97706">LEMON</text>
  <text x="200" y="227" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#d97706">BOTTLE</text>
  <text x="200" y="350" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
