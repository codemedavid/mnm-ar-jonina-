<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fda4af"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="4" fill="#fda4af" opacity="0.6"/>
  <circle cx="320" cy="100" r="3" fill="#fb7185" opacity="0.5"/>
  <circle cx="100" cy="300" r="3.5" fill="#ffe4e6" opacity="0.7"/>
  <circle cx="310" cy="280" r="4" fill="#fda4af" opacity="0.5"/>
  <text x="70" y="130" font-size="18" opacity="0.4">&#x2728;</text>
  <text x="310" y="200" font-size="16" opacity="0.35">&#x2728;</text>
  <text x="90" y="250" font-size="14" opacity="0.3">&#x2728;</text>
  <!-- larger vial for 30mg -->
  <rect x="150" y="90" width="90" height="215" rx="14" fill="url(#vial)" opacity="0.15" stroke="#fb7185" stroke-width="2.5"/>
  <rect x="157" y="150" width="76" height="149" rx="10" fill="url(#liquid)" opacity="0.5"/>
  <circle cx="180" cy="250" r="4.5" fill="white" opacity="0.5"/>
  <circle cx="210" cy="225" r="3.5" fill="white" opacity="0.4"/>
  <circle cx="190" cy="275" r="3" fill="white" opacity="0.35"/>
  <rect x="162" y="77" width="66" height="24" rx="7" fill="url(#cap)"/>
  <rect x="168" y="70" width="54" height="11" rx="5.5" fill="#e11d48"/>
  <rect x="162" y="112" width="9" height="65" rx="4.5" fill="white" opacity="0.3"/>
  <rect x="164" y="180" width="62" height="42" rx="7" fill="white" opacity="0.8"/>
  <text x="195" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#be123c">TR30</text>
  <text x="195" y="214" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9d7a9f">30mg</text>
  <!-- larger BA10 water vial -->
  <rect x="260" y="180" width="44" height="120" rx="9" fill="#e0f2fe" opacity="0.6" stroke="#7dd3fc" stroke-width="1.5"/>
  <rect x="265" y="220" width="34" height="75" rx="7" fill="#bae6fd" opacity="0.5"/>
  <rect x="267" y="173" width="30" height="14" rx="5" fill="#38bdf8"/>
  <text x="282" y="280" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#0284c7">BA10</text>
  <text x="200" y="355" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
