<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="4" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="320" cy="100" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="100" cy="300" r="3.5" fill="#fbcfe8" opacity="0.7"/>
  <circle cx="310" cy="280" r="4" fill="#93c5fd" opacity="0.5"/>
  <text x="70" y="130" font-size="18" opacity="0.4">&#x2728;</text>
  <text x="310" y="200" font-size="16" opacity="0.35">&#x2728;</text>
  <text x="85" y="260" font-size="14" opacity="0.3">&#x1F4A7;</text>
  <!-- multiple small vials for aqualyx pack -->
  <!-- vial 1 -->
  <rect x="115" y="130" width="45" height="150" rx="8" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="2"/>
  <rect x="120" y="180" width="35" height="94" rx="6" fill="url(#liquid)" opacity="0.5"/>
  <rect x="122" y="121" width="36" height="16" rx="5" fill="url(#cap)"/>
  <rect x="119" y="145" width="5" height="40" rx="2.5" fill="white" opacity="0.3"/>
  <!-- vial 2 -->
  <rect x="178" y="130" width="45" height="150" rx="8" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="2"/>
  <rect x="183" y="175" width="35" height="99" rx="6" fill="url(#liquid)" opacity="0.55"/>
  <rect x="185" y="121" width="36" height="16" rx="5" fill="url(#cap)"/>
  <rect x="182" y="145" width="5" height="40" rx="2.5" fill="white" opacity="0.3"/>
  <!-- vial 3 -->
  <rect x="241" y="130" width="45" height="150" rx="8" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="2"/>
  <rect x="246" y="185" width="35" height="89" rx="6" fill="url(#liquid)" opacity="0.45"/>
  <rect x="248" y="121" width="36" height="16" rx="5" fill="url(#cap)"/>
  <rect x="245" y="145" width="5" height="40" rx="2.5" fill="white" opacity="0.3"/>
  <!-- bubbles -->
  <circle cx="140" cy="240" r="3" fill="white" opacity="0.5"/>
  <circle cx="200" cy="250" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="265" cy="235" r="3" fill="white" opacity="0.45"/>
  <!-- label -->
  <rect x="152" y="295" width="96" height="30" rx="8" fill="white" opacity="0.85"/>
  <text x="200" y="315" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d4ed8">AQUALYX</text>
  <text x="200" y="360" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
