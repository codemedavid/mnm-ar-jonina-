<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="75" cy="75" r="4" fill="#f9a8d4" opacity="0.6"/>
  <circle cx="325" cy="95" r="3" fill="#fde68a" opacity="0.5"/>
  <text x="65" y="120" font-size="16" opacity="0.4">&#x2728;</text>
  <text x="315" y="190" font-size="14" opacity="0.35">&#x1F34B;</text>
  <rect x="130" y="48" width="140" height="26" rx="13" fill="#fbbf24" opacity="0.2"/>
  <text x="200" y="66" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#d97706">COMPLETE SET</text>
  <!-- lemon bottle -->
  <ellipse cx="155" cy="200" rx="42" ry="68" fill="url(#vial)" opacity="0.15" stroke="#fbbf24" stroke-width="2"/>
  <ellipse cx="155" cy="210" rx="34" ry="55" fill="url(#liquid)" opacity="0.5"/>
  <rect x="142" y="125" width="26" height="22" rx="4" fill="#fef9c3" opacity="0.4" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="139" y="115" width="32" height="14" rx="5" fill="url(#cap)"/>
  <ellipse cx="138" cy="188" rx="4" ry="22" fill="white" opacity="0.3"/>
  <rect x="133" y="198" width="44" height="28" rx="5" fill="white" opacity="0.85"/>
  <text x="155" y="211" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="700" fill="#d97706">LEMON</text>
  <text x="155" y="221" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#d97706">BOTTLE</text>
  <!-- syringe -->
  <g transform="translate(220, 110) rotate(12)">
    <rect x="0" y="0" width="14" height="150" rx="4" fill="white" opacity="0.7" stroke="#fde68a" stroke-width="1.5"/>
    <rect x="3" y="50" width="8" height="95" rx="2" fill="#fef9c3" opacity="0.4"/>
    <rect x="-2" y="-8" width="18" height="10" rx="3" fill="#fde68a"/>
    <rect x="4" y="-30" width="6" height="28" rx="2" fill="#e5e7eb"/>
    <rect x="1" y="-35" width="12" height="8" rx="3" fill="#d1d5db"/>
    <line x1="7" y1="150" x2="7" y2="175" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <rect x="260" y="250" width="40" height="30" rx="6" fill="white" opacity="0.8" stroke="#fde68a" stroke-width="1"/>
  <text x="280" y="270" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#d97706">SWAB</text>
  <text x="200" y="355" text-anchor="middle" font-size="22">&#x1F380;</text>
</svg>
