  <rect x="99" y="160" width="30" height="84" rx="5" fill="url(#liquid)" opacity="0.5"/>
  <rect x="101" y="113" width="26" height="12" rx="4" fill="url(#cap)"/>
  <rect x="148" y="120" width="38" height="130" rx="7" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="152" y="155" width="30" height="89" rx="5" fill="url(#liquid)" opacity="0.55"/>
  <rect x="154" y="113" width="26" height="12" rx="4" fill="url(#cap)"/>
  <rect x="201" y="120" width="38" height="130" rx="7" fill="url(#vial)" opacity="0.12" stroke="#60a5fa" stroke-width="1.5"/>
