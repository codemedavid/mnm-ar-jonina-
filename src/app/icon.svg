<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="r2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Ribbon bow -->
  <g transform="translate(32, 18)">
    <ellipse cx="-7" cy="1" rx="12" ry="8" fill="url(#r1)" opacity="0.9" transform="rotate(-30)"/>
    <ellipse cx="7" cy="-1" rx="12" ry="8" fill="url(#r2)" opacity="0.9" transform="rotate(30)"/>
    <circle cx="0" cy="1" r="4.5" fill="#db2777"/>
    <path d="M-3,5 Q-8,16 -11,24" stroke="#f9a8d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M3,5 Q8,16 11,24" stroke="#f9a8d4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- M letter -->
  <text x="32" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="800" fill="url(#txt)">M</text>
